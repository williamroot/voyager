# Compose pra máquinas auxiliares de workers (sem postgres/redis/web/nginx).
# Conecta no Postgres dedicado (192.168.30.101) e Redis dedicado (192.168.30.100).
#
# Setup:
#   1. .env precisa ter DATABASE_URL=postgres://...@192.168.30.101:5432/voyager
#      e REDIS_URL=redis://192.168.30.100:6379/0
#   2. Hosts dedicados precisam estar acessíveis na LAN
#   3. docker compose -f docker-compose-workers.yml up -d --build
#
# IMPORTANTE: o drainer do stream de enrichment roda APENAS no host web .32
# (docker-compose-prod.yml). Workers daqui só publicam — nenhum deles
# consome o stream de resultados.
#
# RAM / scale (revisado 2026-06-08 pós-OOM):
#   Incidente: a VM .102 (56GB) travou por OOM — o config pedia ~608 réplicas
#   SEM mem_limit, então 1 worker que inchava (BS4 em página PJe grande) derrubava
#   o HOST inteiro em vez de só o container. Correções:
#     1. mem_limit POR serviço — Docker mata o worker que estoura (RQ re-enfileira),
#        nunca o host. Teto por perfil de carga (PJe/BS4 pesado=768m, e-SAJ=640m,
#        REST/leve=512m, ingestion/ML=1g).
#     2. scale cortado ~608 → ~304 réplicas (densidade ~200MB/worker em 62GB de RAM,
#        deixando headroom pros picos). Re-escalar gargalo (trf3/tjmg/tjsp) conforme
#        backlog, monitorando `free -h` na VM.
services:
  worker_trf1:
    build:
      context: .
      target: runtime
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf1
    env_file: .env
    volumes:
      - .:/app
    mem_limit: 768m
    deploy:
      # 2026-05-14: 60 → 90 → 120 → 40 (realocação: TRF3/TJMG são bottleneck,
      # TRF1 com 40 workers já drena em ~12h, libera CPU/RAM pros outros).
      # 2026-06-08: 40 → 24 (pós-OOM da VM — ver header do arquivo).
      replicas: 24
    restart: unless-stopped

  worker_djen_audit:
    build:
      context: .
      target: runtime
    image: voyager-web:prod
    command: python manage.py rqworker djen_audit
    env_file: .env
    volumes:
      - .:/app
    mem_limit: 512m
    deploy:
      # 2026-06-08: 10 → 6 (pós-OOM).
      replicas: 6
    restart: unless-stopped
    

  worker_trf3:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf3
    env_file: .env
    volumes:
      - .:/app
    mem_limit: 768m
    deploy:
      # 2026-05-14: 50 → 90 → 120 → 160 → 180 (pós-resize 32→56GB VM).
      # 2026-06-08: 160 → 72 (pós-OOM — gargalo principal, mantém prioridade).
      replicas: 72
    restart: unless-stopped

  worker_trf5:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf5
    env_file: .env
    volumes:
      - .:/app
    mem_limit: 768m
    deploy:
      # Ramp 10 → 60 em 2026-05-20 após validar enriquecimento OK em prod
      # (1.7k ok / 4 errors com 10 workers a 100% utilização → safe escalar).
      # 2026-06-08: 60 → 24 (pós-OOM).
      replicas: 24
    restart: unless-stopped

  worker_tjmg:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjmg
    env_file: .env
    volumes:
      - .:/app
    mem_limit: 768m
    deploy:
      # 2026-05-14: 50 → 90 → 120 → 160 → 180. Bottleneck upstream PJe.
      # 2026-06-08: 160 → 72 (pós-OOM — gargalo principal, mantém prioridade).
      replicas: 72
    restart: unless-stopped

  worker_tjma:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjma
    env_file: .env
    volumes:
      - .:/app
    mem_limit: 768m
    deploy:
      # Ramp inicial 10 réplicas (mesmo critério do TRF5 no 1º deploy:
      # 10 a 100% → safe escalar). TJMA é PJe padrão, mesmo bottleneck
      # upstream do TJMG; volume DJEN observado ≈ 11k itens/dia.
      # 2026-06-08: 10 → 8 (pós-OOM).
      replicas: 8
    restart: unless-stopped

  worker_tjsp:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjsp
    env_file: .env
    volumes:
      - .:/app
    mem_limit: 640m
    deploy:
      # 2026-05-24: criado com 60 réplicas. e-SAJ é HTTP puro (sem Selenium);
      # cada job faz 2 requests (open.do + search.do→show.do). Sem proxy pool
      # configurado: e-SAJ tolera taxa moderada de IP único; subir réplicas se
      # rate-limit aparecer e considerar adicionar ProxyScrapePool no enricher.
      # 2026-06-08: 60 → 40 (pós-OOM — maior volume, mantém pool relevante).
      replicas: 40
    restart: unless-stopped

  worker_tjdft:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjdft
    env_file: .env
    volumes:
      - .:/app
    mem_limit: 512m
    deploy:
      # Ramp inicial 10 réplicas (mesmo critério do TJMA/TRF5 1º deploy).
      # TJDFT é REST API (Spring Boot atrás de AWS ALB), cada job faz 4 GETs
      # JSON (lista + dados + 3 polos) — bem mais barato que PJe JSF clássico
      # mas com round-trip TLS adicional por polo. Sem ProxyScrapePool: API
      # pública tolera taxa moderada de IP único; observar rate-limit antes
      # de escalar.
      # 2026-06-08: 10 → 8 (pós-OOM).
      replicas: 8
    restart: unless-stopped

  # ---- Adicionados no recon 2026-06-29 (consulta pública aberta) ----
  # PAUSADOS (replicas: 0) pós-incidente 2026-07-01: o backfill em massa desses
  # tribunais + agregações de warm-job sobre tribunals_processo (que cresceu)
  # saturaram o DB e derrubaram o web. Reativar SÓ após: (1) índice pro
  # pending-scan do reabastecer, (2) MV-backing das agregações de dashboard,
  # (3) fix do over-enqueue do reabastecer (enrich_tjpe tinha 1,77M jobs p/ 834
  # processos). Enrichers validados e prontos; ramp controlado/off-peak depois.
  worker_tjce:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjce
    env_file: .env
    volumes: [".:/app"]
    mem_limit: 768m
    deploy: {replicas: 0}   # PJe clássico, ~1M processos
    restart: unless-stopped

  worker_tjap:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjap
    env_file: .env
    volumes: [".:/app"]
    mem_limit: 768m
    deploy: {replicas: 0}   # PJe clássico, ~200k
    restart: unless-stopped

  worker_tjpe:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjpe
    env_file: .env
    volumes: [".:/app"]
    mem_limit: 768m
    deploy: {replicas: 0}   # PJe clássico, volume baixo
    restart: unless-stopped

  worker_tjrj:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjrj
    env_file: .env
    volumes: [".:/app"]
    mem_limit: 768m
    deploy: {replicas: 0}   # PJe clássico (sem processos ingeridos ainda)
    restart: unless-stopped

  worker_tjro:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjro
    env_file: .env
    volumes: [".:/app"]
    mem_limit: 768m
    deploy: {replicas: 0}   # PJe clássico (host pode bloquear datacenter IPs)
    restart: unless-stopped

  worker_tjac:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjac
    env_file: .env
    volumes: [".:/app"]
    mem_limit: 640m
    deploy: {replicas: 0}   # e-SAJ, ~142k
    restart: unless-stopped

  worker_tjmt:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjmt
    env_file: .env
    volumes: [".:/app"]
    mem_limit: 512m
    deploy: {replicas: 0}   # REST (SPA Angular), ~558k
    restart: unless-stopped

  worker_tjpa:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjpa
    env_file: .env
    volumes: [".:/app"]
    mem_limit: 512m
    deploy: {replicas: 0}   # REST (consilium), ~324k — throttle 429
    restart: unless-stopped

  worker_tjal:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjal
    env_file: .env
    volumes:
      - .:/app
    mem_limit: 640m
    deploy:
      # TJAL roda o MESMO e-SAJ do TJSP (HTTP puro, 2 requests/job: open.do +
      # search.do→show.do). Volume muito menor que TJSP — ramp inicial 10
      # réplicas (critério do 1º deploy de tribunal novo).
      # 2026-06-08: 10 → 8 (pós-OOM).
      # 2026-06-17: 8 → 24. Passou a usar o pool ProxyScrape (PREFER_CORTEX=False,
      # ver enrichers/esaj.py) → paraleliza pelos 2500+ IPs; sobe pra drenar o
      # backlog acumulado enquanto o enrich falhava no Cortex. mem_limit protege.
      replicas: 24
    restart: unless-stopped

  worker_default:
    image: voyager-web:prod
    command: python manage.py rqworker default
    env_file: .env
    volumes:
      - .:/app
    mem_limit: 512m
    deploy:
      replicas: 2
    restart: unless-stopped

  worker_ingestion:
    image: voyager-web:prod
    command: python manage.py rqworker djen_ingestion djen_backfill
    env_file: .env
    volumes:
      - .:/app
    # _ingest_day_por_uf abre 27 fetches paralelos (UFs) × proxy retries. Sem
    # ulimit alto, esgota FDs do container e os jobs morrem com errno 24
    # ("Too many open files"), perdendo dados nas janelas de 1 dia.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: 1g
    deploy:
      # 2026-05-24: 4 → 8 — backfill simultâneo de 3 tribunais novos (TRF2/4/6).
      replicas: 8
    restart: unless-stopped

  worker_datajud:
    image: voyager-web:prod
    command: python manage.py rqworker datajud
    env_file: .env
    volumes:
      - .:/app
    mem_limit: 512m
    deploy:
      # Datajud é leve (1 request HTTP por processo).
      # 2026-05-14: 90 → 20 (fila zerada, RAM cedida pros enrich).
      # 2026-05-24: 20 → 60 — 3 tribunais novos em backfill (TRF2/4/6) puxam
      # auto-enqueue Datajud por cada mov ingerida; pool dimensionado pra fluxo.
      # 2026-06-08: 60 → 24 (pós-OOM — fila leve, re-escalar se backlog subir).
      replicas: 24
    restart: unless-stopped

  worker_classificacao:
    image: voyager-web:prod
    command: python manage.py rqworker classificacao
    env_file: .env
    volumes:
      - .:/app
    # Carrega o modelo ML (ClassificadorVersao ativa) na memória do processo.
    mem_limit: 1g
    deploy:
      replicas: 8
    restart: unless-stopped
