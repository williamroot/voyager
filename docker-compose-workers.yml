# Compose pra máquinas auxiliares de workers (sem postgres/redis/web/nginx).
# Conecta no Postgres dedicado (192.168.30.101) e Redis dedicado (192.168.30.100).
#
# Setup:
#   1. .env precisa ter DATABASE_URL=postgres://...@192.168.30.101:5432/voyager
#      e REDIS_URL=redis://192.168.30.100:6379/0
#   2. Hosts dedicados precisam estar acessíveis na LAN
#   3. docker compose -f docker-compose-workers.yml up -d --build
#
# IMPORTANTE: o drainer do stream de enrichment roda APENAS no host web .32
# (docker-compose-prod.yml). Workers daqui só publicam — nenhum deles
# consome o stream de resultados.
services:
  worker_trf1:
    build:
      context: .
      target: runtime
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf1
    env_file: .env
    volumes:
      - .:/app
    deploy:
      # 2026-05-14: 60 → 90 → 120 → 40 (realocação: TRF3/TJMG são bottleneck,
      # TRF1 com 40 workers já drena em ~12h, libera CPU/RAM pros outros).
      replicas: 40
    restart: unless-stopped

  worker_djen_audit:
    build:
      context: .
      target: runtime
    image: voyager-web:prod
    command: python manage.py rqworker djen_audit
    env_file: .env
    volumes:
      - .:/app
    deploy:    
      replicas: 10
    restart: unless-stopped
    

  worker_trf3:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf3
    env_file: .env
    volumes:
      - .:/app
    deploy:
      # 2026-05-14: 50 → 90 → 120 → 160 → 180 (pós-resize 32→56GB VM).
      replicas: 160
    restart: unless-stopped

  worker_trf5:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf5
    env_file: .env
    volumes:
      - .:/app
    deploy:
      # Ramp 10 → 60 em 2026-05-20 após validar enriquecimento OK em prod
      # (1.7k ok / 4 errors com 10 workers a 100% utilização → safe escalar).
      replicas: 60
    restart: unless-stopped

  worker_tjmg:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjmg
    env_file: .env
    volumes:
      - .:/app
    deploy:
      # 2026-05-14: 50 → 90 → 120 → 160 → 180. Bottleneck upstream PJe.
      replicas: 160
    restart: unless-stopped

  worker_default:
    image: voyager-web:prod
    command: python manage.py rqworker default
    env_file: .env
    volumes:
      - .:/app
    deploy:
      replicas: 2
    restart: unless-stopped

  worker_ingestion:
    image: voyager-web:prod
    command: python manage.py rqworker djen_ingestion djen_backfill
    env_file: .env
    volumes:
      - .:/app
    # _ingest_day_por_uf abre 27 fetches paralelos (UFs) × proxy retries. Sem
    # ulimit alto, esgota FDs do container e os jobs morrem com errno 24
    # ("Too many open files"), perdendo dados nas janelas de 1 dia.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      # 2026-05-24: 4 → 8 — backfill simultâneo de 3 tribunais novos (TRF2/4/6).
      replicas: 8
    restart: unless-stopped

  worker_datajud:
    image: voyager-web:prod
    command: python manage.py rqworker datajud
    env_file: .env
    volumes:
      - .:/app
    deploy:
      # Datajud é leve (1 request HTTP por processo).
      # 2026-05-14: 90 → 20 (fila zerada, RAM cedida pros enrich).
      # 2026-05-24: 20 → 60 — 3 tribunais novos em backfill (TRF2/4/6) puxam
      # auto-enqueue Datajud por cada mov ingerida; pool dimensionado pra fluxo.
      replicas: 60
    restart: unless-stopped

  worker_classificacao:
    image: voyager-web:prod
    command: python manage.py rqworker classificacao
    env_file: .env
    volumes:
      - .:/app
    deploy:
      replicas: 8
    restart: unless-stopped
