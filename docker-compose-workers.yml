# Compose pra máquinas auxiliares de workers (sem postgres/redis/web/nginx).
# Conecta no Postgres dedicado (192.168.1.82) e Redis dedicado (192.168.1.219).
#
# Setup:
#   1. .env precisa ter DATABASE_URL=postgres://...@192.168.1.82:5432/voyager
#      e REDIS_URL=redis://192.168.1.219:6379/0
#   2. Hosts dedicados precisam estar acessíveis na LAN
#   3. docker compose -f docker-compose-workers.yml up -d --build
#
# IMPORTANTE: o drainer do stream de enrichment roda APENAS no .30
# (docker-compose-prod.yml). Workers daqui só publicam — nenhum deles
# consome o stream de resultados.
services:
  worker_trf1:
    build:
      context: .
      target: runtime
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf1
    env_file: .env
    volumes:
      - .:/app
    deploy:
      # TRF1 com problema interno — reduzido drasticamente até recuperar.
      replicas: 10
    restart: always

  worker_trf3:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf3
    env_file: .env
    volumes:
      - .:/app
    deploy:
      # Capacidade redirecionada do TRF1 pra TRF3.
      replicas: 50
    restart: always

  worker_tjmg:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_tjmg
    env_file: .env
    volumes:
      - .:/app
    deploy:
      replicas: 50
    restart: always

  worker_default:
    image: voyager-web:prod
    command: python manage.py rqworker default
    env_file: .env
    volumes:
      - .:/app
    deploy:
      replicas: 2
    restart: always

  worker_ingestion:
    image: voyager-web:prod
    command: python manage.py rqworker djen_ingestion djen_backfill
    env_file: .env
    volumes:
      - .:/app
    # _ingest_day_por_uf abre 27 fetches paralelos (UFs) × proxy retries. Sem
    # ulimit alto, esgota FDs do container e os jobs morrem com errno 24
    # ("Too many open files"), perdendo dados nas janelas de 1 dia.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      replicas: 4
    restart: always

  worker_datajud:
    image: voyager-web:prod
    command: python manage.py rqworker datajud
    env_file: .env
    volumes:
      - .:/app
    deploy:
      # Datajud é leve (1 request HTTP por processo). 90 réplicas em
      # cada host de workers (.177, .184) — total ~210 com .30.
      replicas: 90
    restart: always
