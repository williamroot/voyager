services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Expõe na LAN pra workers em outras máquinas (192.168.1.177).
    # Bind no IP específico evita exposição na internet.
    ports:
      - "192.168.1.30:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/pg_init:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - max_connections=500
      # Buffer cache em RAM. Regra: 25% da RAM. Servidor tem 15GB → 3GB.
      - -c
      - shared_buffers=3GB
      # Estimativa do que SO + PG têm em cache. Regra: 50-75% da RAM.
      - -c
      - effective_cache_size=10GB
      # Por sort/hash/conn. Em teoria pode ser usado várias vezes simultâneas
      # (subqueries paralelos). work_mem × max_connections × parallel × 2 = teto
      # (12MB × 500 × 1 × 2 = 12GB). Mantemos 12MB pra não estourar com alta concorrência.
      - -c
      - work_mem=12MB
      # VACUUM, REINDEX, CREATE INDEX. Pode subir alto sem afetar conexões normais.
      - -c
      - maintenance_work_mem=512MB
      # Reduz frequência de checkpoints (escrita seq mais barata).
      - -c
      - max_wal_size=4GB
      - -c
      - min_wal_size=1GB
      - -c
      - checkpoint_completion_target=0.9
      # SSD — random_page == sequential_page custo.
      - -c
      - random_page_cost=1.1
      # Workers paralelos por query. 16 CPU host → 8 paralelos por query, 16 globalmente.
      - -c
      - max_worker_processes=16
      - -c
      - max_parallel_workers=16
      - -c
      - max_parallel_workers_per_gather=4
      # WAL otimizações
      - -c
      - wal_compression=on
      - -c
      - wal_buffers=16MB
      # Statistics target — melhora plans em colunas com cardinalidade alta.
      - -c
      - default_statistics_target=200
      # Logs de queries lentas pra debug futuro.
      - -c
      - log_min_duration_statement=2000
      - -c
      - track_io_timing=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  web:
    build:
      context: .
      target: runtime
    image: voyager-web:prod
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application -b 0.0.0.0:8000
                     -w 4 -k gthread --threads 4
                     --timeout 60 --graceful-timeout 30
                     --access-logfile - --error-logfile -"
    env_file: .env
    volumes:
      - .:/app:ro
      - static:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/liveness/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  worker_ingestion:
    image: voyager-web:prod
    command: python manage.py rqworker djen_ingestion djen_backfill
    env_file: .env
    volumes:
      - .:/app:ro
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 4
    restart: always

  worker_default:
    image: voyager-web:prod
    command: python manage.py rqworker default
    env_file: .env
    volumes:
      - .:/app:ro
    depends_on:
      web:
        condition: service_healthy
    restart: always

  worker_trf1:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf1
    env_file: .env
    volumes:
      - .:/app:ro
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 40
    restart: always

  worker_trf3:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf3
    env_file: .env
    volumes:
      - .:/app:ro
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 40
    restart: always

  worker_manual:
    image: voyager-web:prod
    command: python manage.py rqworker manual
    env_file: .env
    volumes:
      - .:/app:ro
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: always

  scheduler:
    image: voyager-web:prod
    command: python manage.py djen_register_schedules_and_run
    env_file: .env
    volumes:
      - .:/app:ro
    depends_on:
      web:
        condition: service_healthy
    restart: always

  # Único consumer do stream de enrichment. Aplica writes em bulk numa
  # transação por batch — substitui o write direto que cada worker fazia
  # (causava contenção de BufferMapping LWLock no Postgres). Réplicas != 1
  # NÃO é suportado: ordering depende de consumer único por group. Mais
  # de 1 não quebra correção (consumers compartilham PEL), mas perde a
  # garantia de batch grande == 1 transação grande.
  enrichment_drainer:
    image: voyager-web:prod
    command: python manage.py enrichers_drain
    env_file: .env
    volumes:
      - .:/app:ro
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: always

  nginx:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - static:/var/www/static:ro
    depends_on:
      web:
        condition: service_healthy
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: always

volumes:
  postgres_data:
  static:
