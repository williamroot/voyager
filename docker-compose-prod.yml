services:
  web:
    build:
      context: .
      target: runtime
    image: voyager-web:prod
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application -b 0.0.0.0:8000
                     -w 4 -k gthread --threads 4
                     --timeout 60 --graceful-timeout 30
                     --access-logfile - --error-logfile -"
    env_file: .env
    volumes:
      - .:/app
      - static:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/liveness/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
  
  worker_manual:
    image: voyager-web:prod
    command: python manage.py rqworker manual
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: always  

  scheduler:
    image: voyager-web:prod
    command: python manage.py djen_register_schedules_and_run
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    restart: always

  # Worker dedicado pra warm de cache do dashboard. Roda na fila `warm`
  # (kpis, charts, partes, estatísticas, filtros, MV refresh). 2 réplicas
  # permitem queries lentas e rápidas em paralelo sem bloquear umas às
  # outras. Isolado do `default` (que tem watchdogs/ticks do scheduler).
  worker_warm:
    image: voyager-web:prod
    command: python manage.py rqworker warm
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: always

  # Consumers do stream de enrichment. XREADGROUP distribui entries
  # entre consumers do mesmo group — escalar replicas dá throughput x N.
  # Workers concorrentes podem ter racing em upsert de Parte, mas as
  # partial unique constraints (uniq_parte_*) tornam o pattern
  # bulk_create(ignore_conflicts) idempotente.
  # Drainer LEGACY: consome o stream antigo `voyager:enrichment:results`
  # (sem suffix), onde estão entries publicadas antes do deploy do shard.
  # Workers atuais publicam apenas nos streams sharded — assim que o XLEN
  # do legacy zerar, este service pode ser desligado.
  enrichment_drainer:
    image: voyager-web:prod
    command: python manage.py enrichers_drain --partition legacy --batch-size 1000 --block-ms 500
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: always

  # Drainers SHARDED: 1 instância por partition (hash(process_id) % N).
  # Cada partition tem seu próprio stream físico — sem cruzamento de
  # DELETE+INSERT no mesmo process_id entre drainers, sem deadlock.
  # N=4 (vide enrichers/stream.py:STREAM_PARTITIONS).
  enrichment_drainer_p0:
    image: voyager-web:prod
    command: python manage.py enrichers_drain --partition 0 --batch-size 1000 --block-ms 500
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: always

  enrichment_drainer_p1:
    image: voyager-web:prod
    command: python manage.py enrichers_drain --partition 1 --batch-size 1000 --block-ms 500
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: always

  enrichment_drainer_p2:
    image: voyager-web:prod
    command: python manage.py enrichers_drain --partition 2 --batch-size 1000 --block-ms 500
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: always

  enrichment_drainer_p3:
    image: voyager-web:prod
    command: python manage.py enrichers_drain --partition 3 --batch-size 1000 --block-ms 500
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: always

  nginx:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - static:/var/www/static:ro
    depends_on:
      web:
        condition: service_healthy
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: always

volumes:
  static:
