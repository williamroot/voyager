services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/pg_init:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=2GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - max_wal_size=2GB
      - -c
      - random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - noeviction
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: always

  web:
    build:
      context: .
      target: runtime
    image: voyager-web:prod
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application -b 0.0.0.0:8000
                     -w 4 -k gthread --threads 4
                     --timeout 60 --graceful-timeout 30
                     --access-logfile - --error-logfile -"
    env_file: .env
    volumes:
      - static:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/liveness/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  worker_ingestion:
    image: voyager-web:prod
    command: python manage.py rqworker djen_ingestion djen_backfill
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: always

  worker_default:
    image: voyager-web:prod
    command: python manage.py rqworker default
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 4
    restart: always

  scheduler:
    image: voyager-web:prod
    command: python manage.py djen_register_schedules_and_run
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - static:/var/www/static:ro
    depends_on:
      web:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  redis_data:
  static:
