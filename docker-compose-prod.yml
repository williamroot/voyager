services:
  web:
    build:
      context: .
      target: runtime
    image: voyager-web:prod
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application -b 0.0.0.0:8000
                     -w 4 -k gthread --threads 4
                     --timeout 60 --graceful-timeout 30
                     --access-logfile - --error-logfile -"
    env_file: .env
    volumes:
      - .:/app
      - static:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/liveness/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  worker_ingestion:
    image: voyager-web:prod
    command: python manage.py rqworker djen_ingestion djen_backfill
    env_file: .env
    volumes:
      - .:/app
    # _ingest_day_por_uf abre 27 fetches paralelos (UFs) × proxy retries. Sem
    # ulimit alto, esgota FDs do container e os jobs morrem com errno 24
    # ("Too many open files"), perdendo dados nas janelas de 1 dia.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 4
    restart: always

  worker_default:
    image: voyager-web:prod
    command: python manage.py rqworker default
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    restart: always

  worker_trf1:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf1
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      # TRF1 com problema de banco (JBoss errorUnexpected) — reduzido pra
      # 5 enquanto eles não estabilizam. Capacidade redirecionada pra TRF3.
      replicas: 5
    restart: always

  worker_trf3:
    image: voyager-web:prod
    command: python manage.py rqworker enrich_trf3
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 75
    restart: always

  worker_manual:
    image: voyager-web:prod
    command: python manage.py rqworker manual
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: always

  worker_datajud:
    image: voyager-web:prod
    command: python manage.py rqworker datajud
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      # Datajud é 1 request HTTP por processo (rápido). 15 réplicas em .30
      # (host de 16 cores compartilhado com web/scheduler/outros workers).
      # Hosts dedicados .177/.184 têm 90 cada.
      replicas: 15
    restart: always

  worker_classificacao:
    image: voyager-web:prod
    command: python manage.py rqworker classificacao
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      # Classificação é compute-bound (queries Movimentacao + bytecode LR).
      # 4 réplicas drenam ~500k/h confortavelmente.
      replicas: 4
    restart: always

  scheduler:
    image: voyager-web:prod
    command: python manage.py djen_register_schedules_and_run
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    restart: always

  # Consumers do stream de enrichment. XREADGROUP distribui entries
  # entre consumers do mesmo group — escalar replicas dá throughput x N.
  # Workers concorrentes podem ter racing em upsert de Parte, mas as
  # partial unique constraints (uniq_parte_*) tornam o pattern
  # bulk_create(ignore_conflicts) idempotente.
  # Drainer LEGACY: consome o stream antigo `voyager:enrichment:results`
  # (sem suffix), onde estão entries publicadas antes do deploy do shard.
  # Workers atuais publicam apenas nos streams sharded — assim que o XLEN
  # do legacy zerar, este service pode ser desligado.
  enrichment_drainer:
    image: voyager-web:prod
    command: python manage.py enrichers_drain --partition legacy --batch-size 1000 --block-ms 500
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: always

  # Drainers SHARDED: 1 instância por partition (hash(process_id) % N).
  # Cada partition tem seu próprio stream físico — sem cruzamento de
  # DELETE+INSERT no mesmo process_id entre drainers, sem deadlock.
  # N=4 (vide enrichers/stream.py:STREAM_PARTITIONS).
  enrichment_drainer_p0:
    image: voyager-web:prod
    command: python manage.py enrichers_drain --partition 0 --batch-size 1000 --block-ms 500
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: always

  enrichment_drainer_p1:
    image: voyager-web:prod
    command: python manage.py enrichers_drain --partition 1 --batch-size 1000 --block-ms 500
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: always

  enrichment_drainer_p2:
    image: voyager-web:prod
    command: python manage.py enrichers_drain --partition 2 --batch-size 1000 --block-ms 500
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: always

  enrichment_drainer_p3:
    image: voyager-web:prod
    command: python manage.py enrichers_drain --partition 3 --batch-size 1000 --block-ms 500
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_healthy
    deploy:
      replicas: 1
    restart: always

  nginx:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - static:/var/www/static:ro
    depends_on:
      web:
        condition: service_healthy
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: always

volumes:
  static:
