worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 16m;
    server_tokens off;

    # Docker embedded DNS — resolver com TTL curto pra detectar mudanças
    # de IP quando containers são recriados (force-recreate).
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Estático servido pelo WhiteNoise (no web). Em prod, pode-se montar
        # /app/staticfiles num volume e servir direto pelo nginx pra performance.
        location /static/ {
            set $upstream "web:8000";
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_cache_valid 200 30d;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /metrics {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            set $upstream "web:8000";
            proxy_pass http://$upstream;
        }

        location / {
            set $upstream "web:8000";
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Cloudflared repassa em HTTP, mas a origem é sempre HTTPS no edge —
            # nginx só recebe tráfego via tunnel, então fixa https.
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 90s;
            # Retry em erros de conexão/timeout — cobre restarts do web container.
            # Limitado a error+timeout+invalid_header pra não retentar POST.
            proxy_next_upstream error timeout invalid_header;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;
        }
    }
}
