global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    stack: voyager-obs
    env: prod

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Acervo DB (zordon @ 192.168.30.114) via postgres_exporter (voyager_exporter, read-only)
  - job_name: postgres_acervo
    scrape_interval: 30s
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          db: acervo
          db_host: "192.168.30.114"

  # GPU telemetry bridge (lê hash Redis vetor:gpu / extracao:gpu, DB 3)
  - job_name: gpu_bridge
    scrape_interval: 30s
    static_configs:
      - targets: ["gpu-bridge:9835"]

  # Host onde o stack roda (zordon). node_exporter opcional — só coleta se subir.
  - job_name: node
    scrape_interval: 30s
    static_configs:
      - targets: ["node-exporter:9100"]
