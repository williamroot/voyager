<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Quadrado base com cantos arredondados -->
  <rect width="64" height="64" rx="14" fill="#0a0a0b"/>

  <!-- Anéis de órbita decorativos -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#ea580c" stroke-width="1.2" opacity="0.18"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#ea580c" stroke-width="0.8" opacity="0.35" stroke-dasharray="2 3"/>

  <!-- Trajetória diagonal (slingshot) -->
  <path d="M 8 50 Q 28 14 56 22" fill="none" stroke="#ea580c" stroke-width="0.7" opacity="0.35" stroke-dasharray="1 2.5"/>

  <!-- Probe Voyager: dish + bus + boom (estilo das novas icones) -->
  <g stroke="#fafafa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Dish (parabólica) — circle aberto -->
    <circle cx="22" cy="32" r="9"/>
    <!-- Linha do dish (arco do prato) -->
    <path d="M 17 38 L 27 26"/>
    <!-- Bus / corpo da probe -->
    <rect x="32" y="28" width="12" height="8" rx="1"/>
    <!-- Boom de antena -->
    <path d="M 44 32 H 54"/>
  </g>

  <!-- Pulsar dot — terminação da boom (Golden Record yellow) -->
  <circle cx="54" cy="32" r="2.4" fill="#facc15"/>

  <!-- Antena curta no topo do dish -->
  <path d="M 22 23 V 14" stroke="#facc15" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Estrelas decorativas (Pale Blue Dot) -->
  <circle cx="50" cy="14" r="1" fill="#fafafa" opacity="0.9"/>
  <circle cx="14" cy="50" r="0.8" fill="#fafafa" opacity="0.7"/>
  <circle cx="48" cy="50" r="1" fill="#93c5fd" opacity="0.8"/>
  <circle cx="14" cy="16" r="0.7" fill="#93c5fd" opacity="0.6"/>
  <circle cx="34" cy="48" r="0.6" fill="#facc15" opacity="0.8"/>
</svg>
