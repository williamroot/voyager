{% comment %}
Tabs 7d / 30d / 90d / 365d com estado ativo conforme `periodo_dias`.

Uso:
  {% include 'dashboard/_partials/period_picker.html' with current=periodo_dias %}
{% endcomment %}
<div class="flex gap-1 items-center text-xs bg-surface/60 border border-border/70 rounded-xl p-1">
  {% for opt in '7,30,90,365'|cut:' '|stringformat:'s' %}{% endfor %}
  <a href="?dias=7"   class="px-3 py-1.5 rounded-lg {% if current == 7 %}bg-muted text-accent-fg{% else %}text-fg-muted hover:text-fg{% endif %}">7 dias</a>
  <a href="?dias=30"  class="px-3 py-1.5 rounded-lg {% if current == 30 %}bg-muted text-accent-fg{% else %}text-fg-muted hover:text-fg{% endif %}">30 dias</a>
  <a href="?dias=90"  class="px-3 py-1.5 rounded-lg {% if current == 90 %}bg-muted text-accent-fg{% else %}text-fg-muted hover:text-fg{% endif %}">90 dias</a>
  <a href="?dias=365" class="px-3 py-1.5 rounded-lg {% if current == 365 %}bg-muted text-accent-fg{% else %}text-fg-muted hover:text-fg{% endif %}">1 ano</a>
</div>
