{% comment %}
Tabs 7d / 30d / 90d / 1 ano / Todo período. `current=None` significa "todo".

Uso:
  {% include 'dashboard/_partials/period_picker.html' with current=periodo_dias %}
{% endcomment %}
{% load voyager_extras %}
<div class="flex gap-1 items-center text-xs bg-card/60 border border-border rounded-xl p-1">
  <a href="?{% query_string request dias=7 %}"   class="px-3 py-1.5 rounded-lg {% if current == 7 %}bg-muted text-accent-fg{% else %}text-fg-muted hover:text-fg{% endif %}">7 dias</a>
  <a href="?{% query_string request dias=30 %}"  class="px-3 py-1.5 rounded-lg {% if current == 30 %}bg-muted text-accent-fg{% else %}text-fg-muted hover:text-fg{% endif %}">30 dias</a>
  <a href="?{% query_string request dias=90 %}"  class="px-3 py-1.5 rounded-lg {% if current == 90 %}bg-muted text-accent-fg{% else %}text-fg-muted hover:text-fg{% endif %}">90 dias</a>
  <a href="?{% query_string request dias=365 %}" class="px-3 py-1.5 rounded-lg {% if current == 365 %}bg-muted text-accent-fg{% else %}text-fg-muted hover:text-fg{% endif %}">1 ano</a>
  <a href="?{% query_string request dias='all' %}" class="px-3 py-1.5 rounded-lg {% if current is None %}bg-muted text-accent-fg{% else %}text-fg-muted hover:text-fg{% endif %}">Todo período</a>
</div>
