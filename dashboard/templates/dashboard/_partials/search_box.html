{% comment %}
Caixa de busca com ícone. Usar dentro de <form method="get">.

Uso:
  {% include 'dashboard/_partials/search_box.html' with name='q' value=q placeholder='Buscar...' %}
{% endcomment %}
<div class="relative flex-1">
  <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-fg-subtle" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
  <input name="{{ name|default:'q' }}" value="{{ value|default:'' }}" placeholder="{{ placeholder|default:'Buscar...' }}"
         class="w-full bg-base/60 border border-border rounded-lg pl-10 pr-3 py-2 text-sm text-fg focus:border-accent focus:outline-none">
</div>
