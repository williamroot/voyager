services:
  worker_datajud:
    image: voyager-web:prod
    command: python manage.py rqworker datajud
    env_file: .env
    volumes:
      - .:/app
    deploy:
      # Datajud é leve (1 request HTTP por processo). 90 réplicas em
      # cada host de workers (.177, .184) — total ~210 com .30.
      replicas: 90
    restart: always
