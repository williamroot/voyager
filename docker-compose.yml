services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voyager}
      POSTGRES_USER: ${POSTGRES_USER:-voyager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voyager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/pg_init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voyager}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "noeviction", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      target: runtime
    volumes:
      - .:/app
    environment:
      PYTHONUNBUFFERED: "1"
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn core.wsgi:application -b 0.0.0.0:8000 -w 4 -k gthread --threads 4 --access-logfile -"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/liveness/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker_ingestion:
    build:
      context: .
      target: runtime
    command: python manage.py rqworker djen_ingestion djen_backfill
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped

  worker_audit:
    build:
      context: .
      target: runtime
    command: python manage.py rqworker djen_audit
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker_default:
    build:
      context: .
      target: runtime
    command: python manage.py rqworker default
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 30
    restart: unless-stopped

  scheduler:
    build:
      context: .
      target: runtime
    command: python manage.py djen_register_schedules_and_run
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - static:/var/www/static:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static:
